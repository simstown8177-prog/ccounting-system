<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 | 샵앤샵 평택1호점</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell narrow-shell">
      <header class="topbar">
        <a class="brand-lockup" href="/">
          <span class="brand-mark">S</span>
          <span>
            <strong>샵앤샵 평택1호점</strong>
            <small>Login Portal</small>
          </span>
        </a>
        <div class="page-actions">
          <a class="secondary-button button-link" href="/">메인으로</a>
        </div>
      </header>

      <main class="auth-layout">
        <section class="auth-intro surface-card">
          <p class="eyebrow">Login</p>
          <h1>선택한 매장 계정으로 로그인합니다.</h1>
          <p class="hero-copy">
            메인에서 선택한 카테고리를 그대로 가져오고, 필요하면 이 페이지에서 다시 바꿀 수 있습니다.
          </p>
          <div id="loginCategoryPreview" class="selected-category"></div>
        </section>

        <section class="auth-panel surface-card">
          <div class="section-heading">
            <div>
              <p class="section-label">Access</p>
              <h2>매장 사용자 로그인</h2>
            </div>
          </div>
          <form id="loginForm" class="stack-form">
            <label>
              매장 선택
              <select id="categorySelect" name="categoryId" required></select>
            </label>
            <label>
              사용자 ID
              <input name="username" type="text" placeholder="예: manager" required />
            </label>
            <label>
              비밀번호
              <input name="password" type="password" placeholder="예: 1234" required />
            </label>
            <button type="submit" class="primary-button">워크스페이스 입장</button>
          </form>
          <p class="helper-text">기본 계정 예시: `manager / 1234`, `staff / 1111`</p>
          <p id="loginError" class="inline-error hidden"></p>
        </section>
      </main>
    </div>

    <script src="login.js"></script>
  </body>
</html>
