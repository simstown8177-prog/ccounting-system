<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>샵앤샵 평택1호점</title>
    <meta name="theme-color" content="#2563eb" />
    <meta name="application-name" content="샵앤샵 재고관리" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/app-icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand-lockup" href="/">
          <span class="brand-mark">S</span>
          <span>
            <strong>샵앤샵 평택1호점</strong>
            <small>Inventory Console</small>
          </span>
        </a>
        <div class="page-actions">
          <button id="seedDataButton" class="secondary-button" type="button">데모 데이터 불러오기</button>
          <button id="goLoginButton" class="primary-button" type="button">Login</button>
        </div>
      </header>

      <main class="page-stack">
        <section class="hero-card">
          <div class="hero-copy-block">
            <p class="eyebrow">Main Selection</p>
            <h1>매장은 메인에서 선택만 하고, 작업은 별도 화면에서 처리합니다.</h1>
            <p class="hero-copy">
              메인에서는 카테고리 선택만 남기고, 로그인은 별도 페이지로, 재고관리 워크스페이스도
              독립 페이지로 분리했습니다.
            </p>
          </div>
          <div class="hero-summary">
            <div id="globalStats" class="stats"></div>
            <div id="selectedCategorySummary" class="selected-category">
              먼저 운영할 매장을 선택하세요.
            </div>
          </div>
        </section>

        <section class="surface-card">
          <div class="section-heading">
            <div>
              <p class="section-label">Categories</p>
              <h2>카테고리 선택</h2>
            </div>
          </div>
          <div id="categoryGrid" class="category-grid clean-grid"></div>
        </section>
      </main>
    </div>

    <script src="pwa.js"></script>
    <script src="main.js"></script>
  </body>
</html>
